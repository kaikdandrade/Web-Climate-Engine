<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Climate Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/gh/kaikdandrade/Web-Climate-Engine@main/Climate.js" defer></script>
</head>

<body class="sunny">
    <canvas id="climateCanvas"></canvas>

    <div class="cloud-layer" aria-hidden="true"></div>
    <div class="flash" id="flash" aria-hidden="true"></div>
    <div class="scene-glow" aria-hidden="true"></div>
    <div class="ground" aria-hidden="true"></div>

    <div class="desert-cactus" aria-hidden="true">
        <div class="cactus">
            <div class="cactus-tall">
                <span class="cactus-arm cactus-arm-left"></span>
                <span class="cactus-arm cactus-arm-right"></span>
                <span class="cactus-flower"></span>
            </div>
        </div>
    </div>

    <div class="snow-snowman" aria-hidden="true">
        <div class="snowman">
            <span class="snowman-hat"></span>
            <span class="snowman-head"></span>
            <span class="snowman-body"></span>
        </div>
    </div>

    <aside class="panel">
        <div class="panel-header">
            <div>
                <span class="eyebrow">Atmosphere Engine</span>
                <h1>Climate<br><strong>Controls</strong></h1>
            </div>
            <div class="badge" id="badge">SUNNY</div>
        </div>

        <div class="control">
            <label for="climateOptions">
                Climate
            </label>
            <select id="climateOptions">
                <option value="sunny">Sunny</option>
                <option value="rain">Rain</option>
                <option value="storm">Storm</option>
                <option value="snow">Snow</option>
                <option value="autumn">Autumn Breeze</option>
                <option value="petals">Gale of Petals</option>
                <option value="sandstorm">Sandstorm</option>
            </select>
        </div>

        <div class="control">
            <label for="intensity">
                Intensity
                <span id="intensityValue">50%</span>
            </label>
            <input id="intensity" type="range" min="1" max="100" value="50" />
        </div>

        <div class="control" id="windPowerControl">
            <label for="windPower">
                Wind Power
                <span id="windPowerValue">30%</span>
            </label>
            <input id="windPower" type="range" min="0" max="100" value="30" />
        </div>

        <div class="control" id="windDirectionControl">
            <label for="windDirection">
                Wind Direction
                <span id="windDirectionName">Right</span>
            </label>
            <select id="windDirection">
                <option value="right">Right</option>
                <option value="left">Left</option>
            </select>
        </div>

        <button class="primary" id="controlBtn" type="button">
            <span class="btn-icon" aria-hidden="true">❚❚</span>
            <span class="btn-text">Pause</span>
        </button>

        <span class="toggle-panel"></span>
    </aside>

    <script src="main.js"></script>
</body>

</html>
